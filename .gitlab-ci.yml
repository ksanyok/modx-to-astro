# ═══════════════════════════════════════════════════════════════════════
# MODX → Astro  ·  GitLab CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════
#
# Full pipeline: migrate → qc → test → build → deploy (zero-downtime)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY   – Private key for rsync deploy (type: File or Variable)
#   DEPLOY_HOST       – e.g. user@your-server.com      (or set below)
#   DEPLOY_PATH       – e.g. /var/www/vhosts/domain.ch  (or set below)
#
# Optional variables:
#   SQL_PATH          – Path to SQL dump inside repo (default: data/dump.sql)
#   ASSETS_PATH       – Path to assets dir inside repo (default: data/assets)
#   SITE_DOMAIN       – Production domain for sitemap/canonical URLs
#   DEPLOY_PORT       – SSH port (default: 22)
#   KEEP_RELEASES     – Number of releases to keep for rollback (default: 3)
#   HEALTH_URL        – URL to verify after deploy (default: https://$SITE_DOMAIN)
#
# Repo structure per site:
#   repo/
#   ├── data/
#   │   ├── dump.sql
#   │   └── assets/
#   ├── cli/               (migration scripts)
#   ├── astro-theme/       (master theme)
#   └── .gitlab-ci.yml     (this file)
# ═══════════════════════════════════════════════════════════════════════

stages:
  - migrate
  - qc
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  # ── Per-site overrides (set in CI/CD Variables or fork) ──
  DEPLOY_HOST: "user@your-server.com"
  DEPLOY_PATH: "/var/www/vhosts/domain.ch/httpdocs"
  SITE_DOMAIN: "example.ch"
  SQL_PATH: "data/dump.sql"
  ASSETS_PATH: "data/assets"

# ─── Shared cache ─────────────────────────────────────────────

.node_cache:
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - cli/node_modules/
      - astro-theme/node_modules/

# ═══════════════════════════════════════════════════════════════
# Stage 1: MIGRATE  –  SQL + assets → JSON content
# ═══════════════════════════════════════════════════════════════

migrate:
  stage: migrate
  image: node:${NODE_VERSION}-alpine
  extends: .node_cache
  script:
    - cd cli && npm ci
    - node migrate.js
        --sql "../${SQL_PATH}"
        --assets "../${ASSETS_PATH}"
        --out ../astro-theme/src/content
        --site "https://${SITE_DOMAIN}"
        --verbose
    - echo "──────────────────────────────────"
    - echo "Migration complete"
    - echo "Pages → $(ls ../astro-theme/src/content/pages/*.json 2>/dev/null | wc -l)"
    - echo "Assets → $(find ../astro-theme/public/assets -type f 2>/dev/null | wc -l)"
    - echo "──────────────────────────────────"
  artifacts:
    paths:
      - astro-theme/src/content/
      - astro-theme/public/assets/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# ═══════════════════════════════════════════════════════════════
# Stage 2: QC  –  Quality-control checks on migrated content
# ═══════════════════════════════════════════════════════════════
# Checks: remaining MODX tags, broken image refs, UTF-8 validity

qc:
  stage: qc
  image: node:20-alpine
  dependencies:
    - migrate
  script:
    - apk add --no-cache python3
    - bash scripts/qc.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "web"

# ═══════════════════════════════════════════════════════════════
# Stage 3: TEST  –  Unit tests for CLI
# ═══════════════════════════════════════════════════════════════

test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  extends: .node_cache
  script:
    - cd cli && npm ci
    - npx jest --verbose --ci
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# ═══════════════════════════════════════════════════════════════
# Stage 4: BUILD  –  Astro static site generation
# ═══════════════════════════════════════════════════════════════

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  extends: .node_cache
  dependencies:
    - migrate
  script:
    - cd astro-theme && npm ci
    - npx astro build
    - |
      PAGE_COUNT=$(find dist -name '*.html' | wc -l)
      echo "══════════════════════════════════"
      echo "Build complete: ${PAGE_COUNT} pages"
      echo "Size: $(du -sh dist | cut -f1)"
      echo "══════════════════════════════════"
  artifacts:
    paths:
      - astro-theme/dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "web"

# ═══════════════════════════════════════════════════════════════
# Stage 5: DEPLOY  –  Symlink-based zero-downtime deploy to Plesk
# ═══════════════════════════════════════════════════════════════
#
# Strategy: timestamped release dirs + atomic ln -sfn symlink swap.
#   DEPLOY_PATH becomes a symlink pointing to the current release.
#   If a crash occurs during rsync, the old symlink stays live.
#   Keeps KEEP_RELEASES previous releases for multi-step rollback.
#   Verifies HEALTH_URL returns HTTP 200 after every deploy.
#
# Required CI/CD Variables: SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_PATH
# Optional: DEPLOY_PORT (default 22), KEEP_RELEASES (default 3),
#           HEALTH_URL (default https://$SITE_DOMAIN)
# ═══════════════════════════════════════════════════════════════

deploy:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build
  before_script:
    - apk add --no-cache rsync openssh-client curl
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p ${DEPLOY_PORT:-22} -H $(echo $DEPLOY_HOST | cut -d@ -f2) >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      PORT="${DEPLOY_PORT:-22}"
      KEEP="${KEEP_RELEASES:-3}"
      RELEASES_BASE="$(dirname ${DEPLOY_PATH})/releases"
      TIMESTAMP="$(date +%Y%m%d_%H%M%S)"
      NEW_RELEASE="${RELEASES_BASE}/${TIMESTAMP}"
      PAGE_COUNT=$(find astro-theme/dist -name '*.html' | wc -l | tr -d ' ')
      echo "Deploying release ${TIMESTAMP} (${PAGE_COUNT} pages) to ${DEPLOY_HOST}:${PORT}"
      # Write deploy manifest
      printf '{\n  "timestamp": "%s",\n  "git_sha": "%s",\n  "git_branch": "%s",\n  "pages": %s,\n  "pipeline_id": "%s",\n  "deploy_host": "%s"\n}\n' \
        "${TIMESTAMP}" "${CI_COMMIT_SHORT_SHA:-local}" "${CI_COMMIT_BRANCH:-unknown}" \
        "${PAGE_COUNT}" "${CI_PIPELINE_ID:-local}" "${DEPLOY_HOST}" \
        > astro-theme/dist/.deploy-manifest.json
      # Create release directory
      ssh -p "$PORT" "$DEPLOY_HOST" "mkdir -p '${NEW_RELEASE}'"
      # Rsync to new release directory
      rsync -az --delete \
        --exclude='.well-known' --exclude='cgi-bin' \
        --exclude='.htaccess' --exclude='.user.ini' \
        -e "ssh -p $PORT" \
        astro-theme/dist/ \
        "${DEPLOY_HOST}:${NEW_RELEASE}/"
      # Atomic symlink swap (ln -sfn = single kernel syscall, no crash gap)
      ssh -p "$PORT" "$DEPLOY_HOST" "
        set -e
        if [ -d '${DEPLOY_PATH}' ] && [ ! -L '${DEPLOY_PATH}' ]; then
          mv '${DEPLOY_PATH}' '${DEPLOY_PATH}.bak.${TIMESTAMP}'
          echo 'Backed up existing webroot'
        fi
        ln -sfn '${NEW_RELEASE}' '${DEPLOY_PATH}'
        echo 'Symlink: ${DEPLOY_PATH} -> ${NEW_RELEASE}'
      "
      # Prune old releases
      ssh -p "$PORT" "$DEPLOY_HOST" "
        ls -1t '${RELEASES_BASE}/' | tail -n +$(( ${KEEP_RELEASES:-3} + 1 )) | while read old; do
          rm -rf '${RELEASES_BASE}/'\"\$old\"
          echo 'Removed old release: '\"\$old\"
        done
      "
      # Health check
      HEALTH="${HEALTH_URL:-https://${SITE_DOMAIN}}"
      if [ -n "$HEALTH" ]; then
        sleep 2
        HTTP_CODE=$(curl -s --max-time 15 -o /dev/null -w '%{http_code}' "$HEALTH" || echo '000')
        if [ "$HTTP_CODE" = "200" ]; then
          echo "Health check passed (HTTP $HTTP_CODE): $HEALTH"
        else
          echo "ERROR: Health check failed (HTTP $HTTP_CODE): $HEALTH"
          echo "Run rollback job to restore previous release."
          exit 1
        fi
      fi
      echo "Deployed successfully: ${RELEASE_NAME}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  environment:
    name: production
    url: https://${SITE_DOMAIN}

# ═══════════════════════════════════════════════════════════════
# ROLLBACK  –  Restore previous release (manual, one-click, atomic)
# ═══════════════════════════════════════════════════════════════

rollback:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p ${DEPLOY_PORT:-22} -H $(echo $DEPLOY_HOST | cut -d@ -f2) >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      PORT="${DEPLOY_PORT:-22}"
      RELEASES_BASE="$(dirname ${DEPLOY_PATH})/releases"
      ssh -p "$PORT" "$DEPLOY_HOST" "
        set -e
        releases=\$(ls -1t '${RELEASES_BASE}/' 2>/dev/null)
        count=\$(echo \"\$releases\" | grep -c .)
        if [ \"\$count\" -lt 2 ]; then
          echo 'Error: no previous release found (count: '\$count')'
          exit 1
        fi
        target=\$(echo \"\$releases\" | sed -n '2p')
        ln -sfn '${RELEASES_BASE}/'\"\$target\" '${DEPLOY_PATH}'
        echo 'Rolled back to: '\"\$target\"
      "
      echo "Rollback complete."
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: manual
  environment:
    name: production
    url: https://${SITE_DOMAIN}
